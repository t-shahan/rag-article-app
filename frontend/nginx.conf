server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — any path not matching a real file falls back to index.html
    # so that React Router handles client-side navigation correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/ requests to the FastAPI backend service.
    # "backend" is resolved by Docker's internal DNS (the service name in docker-compose).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
