server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — any path not matching a real file falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/ requests to the FastAPI backend service.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable buffering so SSE tokens reach the browser immediately.
        # The backend also sends X-Accel-Buffering: no, but being explicit here
        # ensures it works regardless of header propagation.
        proxy_buffering off;
        proxy_cache off;
    }
}
