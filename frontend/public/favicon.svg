<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0e0e0e"/>

  <!-- Outer targeting ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#C2B067" stroke-width="1.5"/>

  <!-- Crosshair lines (gaps in the ring give the reticle look) -->
  <line x1="16" y1="2"  x2="16" y2="8"  stroke="#C2B067" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="16" y2="30" stroke="#C2B067" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2"  y1="16" x2="8"  y2="16" stroke="#C2B067" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="30" y2="16" stroke="#C2B067" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#F0E0A0"/>
</svg>
